name: PR Refactoring Agent

on:
  issue_comment:
    types: [created]

jobs:
  refactor:
    # Only run on PR comments containing /refactor
    if: github.event.issue.pull_request != null && contains(github.event.comment.body, '/cs-agent')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Run refactoring agent
        uses: codescene-oss/pr-refactoring-agent@v1
        with:
          pr_number: ${{ github.event.issue.number }}
          command: 'skill:fix-code-health-degradations'
          model: 'google/gemini-flash-latest'
          push: true
          codescene_token: ${{ secrets.CODESCENE_ACCESS_TOKEN }}
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}
