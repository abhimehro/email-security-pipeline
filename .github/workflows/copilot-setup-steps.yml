name: Development Partner
description: The Development Partner Protocol

on:
  workflow_dispatch:
    inputs:
      request:
        description: "Specific request for the development partner"
        required: false
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, labeled]

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Setup Python Environment
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.12"

      - name: Development Partner Session
        uses: actions/github-script@v9.0.0 # v9.0.0
        env:
          INPUT_REQUEST: ${{ github.event.inputs.request }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('🤝 Development Partner Protocol Activated');
            console.log('Repository:', context.repo.owner + '/' + context.repo.repo);
            console.log('Event:', context.eventName);

            // Log the request if provided via workflow_dispatch
            const request = process.env.INPUT_REQUEST || '';
            if (request) {
              console.log('Request:', request);
            }

      - name: PR Review Assistant
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9.0.0 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Auto-comment on PRs with development partner context
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '👋 Development Partner is reviewing this PR. Will provide feedback shortly.'
            });
