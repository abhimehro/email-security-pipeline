services:
  email-security-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      # Use BuildKit for faster builds and better caching
      args:
        BUILDKIT_INLINE_CACHE: 1

    container_name: email-security-pipeline
    restart: unless-stopped

    # Environment configuration
    env_file:
      - .env

    # Volumes for persistent data and logs
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data

    # Security options
    security_opt:
      - no-new-privileges:true

    # Read-only root filesystem for enhanced security
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Logging configuration
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=email-security-pipeline"

    # Health check
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys, os; sys.exit(0 if os.path.exists('/app/logs') else 1)"]
      interval: 5m
      timeout: 3s
      start_period: 30s
      retries: 3

    # Network configuration
    networks:
      - email-security-net

    # Disable stdin and TTY for production
    stdin_open: false
    tty: false

networks:
  email-security-net:
    driver: bridge
    driver_opts:
      # Isolate network from other containers by default
      com.docker.network.driver.mtu: 1500

volumes:
  logs:
    driver: local
  data:
    driver: local
